# ============================================================================
# nginx.conf — GameNexus (HTTP-only)
# ============================================================================
# Proxy reverso para Next.js na porta 80.
# ⚠️ NÃO requer certificados SSL — funciona no primeiro deploy.
# Após configurar SSL, troque por nginx.ssl.conf.
#
# ─── Primeiro Deploy ────────────────────────────────────────────────────
#   docker compose up -d
#   docker compose run --rm certbot certonly --webroot \
#     -w /var/www/certbot -d gamenexus.seudominio.com
#
# ─── Ativar SSL (trocar config) ─────────────────────────────────────────
#   docker compose cp ./nginx/nginx.ssl.conf nginx:/etc/nginx/nginx.conf
#   docker compose exec nginx nginx -s reload
#
#   ⚠️ O arquivo nginx.ssl.conf já está montado no container.
#   O docker compose cp sobrescreve o mount :ro com uma cópia
#   no filesystem do container (não persiste após docker compose down).
#
#   Para troca permanente: edite docker-compose.yml para montar
#   nginx.ssl.conf como nginx.conf e rebuild:
#     - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
#
# ─── Renovação SSL (cron no host) ───────────────────────────────────────
#   0 3 * * * cd /opt/gamenexus && docker compose run --rm certbot renew \
#     && docker compose exec nginx nginx -s reload
# ============================================================================

# ─── Globais ────────────────────────────────────────────────────────────
# Esconde versão do Nginx em headers Server e páginas de erro.
server_tokens off;

# ─── Rate Limiting ──────────────────────────────────────────────────────
# 10 req/s por IP, com burst de 20 (picos curtos permitidos).
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# ─── Proxy Cache ────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m
                 max_size=100m inactive=60m use_temp_path=off;

# ─── HTTP Server ────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name gamenexus.seudominio.com;

    # ─── ACME Challenge (Let's Encrypt) ─────────────────────────────
    # Certbot valida o domínio servindo arquivos aqui.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── Healthcheck (sem cache, sem log) ───────────────────────────
    location /api/health {
        proxy_pass http://app:3000;
        access_log off;
        proxy_cache off;
    }

    # ─── Proxy Reverso para Next.js ─────────────────────────────────
    location / {
        proxy_pass http://app:3000;
        include /etc/nginx/proxy-params.conf;
    }
}
