# ============================================================================
# proxy-params.conf — GameNexus
# ============================================================================
# Parâmetros compartilhados de proxy reverso para o Next.js.
# Incluído por todos os location blocks que fazem proxy para app:3000.
#
# Uso: include /etc/nginx/proxy-params.conf;
# ============================================================================

# ─── Headers do Proxy ──────────────────────────────────────────────────
# Informam o Next.js sobre a requisição original do cliente.
# Essenciais para gerar URLs corretas (ex: callbacks OAuth).

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# ─── WebSocket Support ─────────────────────────────────────────────────
# Next.js não usa WebSocket em produção (apenas HMR em dev),
# mas mantemos para future-proof: Server-Sent Events, etc.

proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# ─── Timeouts ──────────────────────────────────────────────────────────
# Ajustados para chamadas Steam API (até 15s) e cron jobs.
# proxy_connect_timeout: tempo para estabelecer conexão com upstream
# proxy_send_timeout:    tempo para enviar requisição ao upstream
# proxy_read_timeout:    tempo para ler resposta do upstream

proxy_connect_timeout 10s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# ─── Bufferização ──────────────────────────────────────────────────────
# off = streaming mode: resposta chega ao cliente conforme o upstream envia.
# Melhor para Server-Side Rendering (não espera a página inteira).

proxy_buffering off;
proxy_redirect off;

# ─── Cache de Respostas ────────────────────────────────────────────────
# Cacheia respostas bem-sucedidas por 1 minuto.
# Usa a zona app_cache definida no nginx.conf principal.

proxy_cache app_cache;
proxy_cache_key "$scheme$request_method$host$request_uri";
proxy_cache_valid 200 302 1m;
proxy_cache_use_stale error timeout updating http_500 http_502 http_503;

# Não cacheia requisições autenticadas (evita servir sessão errada)
proxy_no_cache $cookie_sessionid;
proxy_cache_bypass $cookie_sessionid;
