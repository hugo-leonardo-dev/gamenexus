# ============================================================================
# nginx.ssl.conf — GameNexus (HTTPS completo)
# ============================================================================
# Proxy reverso para Next.js com SSL, segurança e performance.
# ⚠️ Requer certificados SSL já gerados pelo Certbot.
#
# Ativar após primeiro deploy:
#   docker compose exec nginx nginx -s quit
#   docker compose exec -u root nginx \
#     cp /etc/nginx/nginx.ssl.conf /etc/nginx/nginx.conf
#   docker compose restart nginx
#
# ─── DH Params (primeira vez) ───────────────────────────────────────────
#   openssl dhparam -out dhparam.pem 2048
#   docker compose cp dhparam.pem nginx:/etc/nginx/dhparam.pem
#   docker compose exec nginx nginx -s reload
# ============================================================================

# ─── Globais ────────────────────────────────────────────────────────────
server_tokens off;

# ─── Rate Limiting ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# ─── Proxy Cache ────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m
                 max_size=100m inactive=60m use_temp_path=off;

# ─── HTTP Server: ACME + Redirecionamento ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name gamenexus.seudominio.com;

    # Certbot valida o domínio aqui
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Healthcheck
    location /api/health {
        proxy_pass http://app:3000;
        access_log off;
        proxy_cache off;
    }

    # Redireciona todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server: Proxy Reverso ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gamenexus.seudominio.com;

    # ─── SSL ────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/gamenexus.seudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gamenexus.seudominio.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS — forca HTTPS por 6 meses
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # DH Params (gerar antes de usar)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ───────────────────────────────────────────
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' https: data: blob:;
        font-src 'self' https: data:;
        connect-src 'self' https://store.steampowered.com https://api.steampowered.com;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ─── Gzip Compression ───────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff font/woff2;

    # ─── Rate Limiting ──────────────────────────────────────────────
    limit_req zone=general burst=20 nodelay;
    limit_req_status 503;

    # ─── Logging ────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/error.log warn;

    # ─── Proxy Reverso ──────────────────────────────────────────────
    location / {
        proxy_pass http://app:3000;
        include /etc/nginx/proxy-params.conf;
    }

    # ─── Static Assets (cache imutavel 1 ano) ──────────────────────
    location /_next/static/ {
        proxy_pass http://app:3000;
        include /etc/nginx/proxy-params.conf;
        proxy_hide_header Cache-Control;
        expires 365d;
        add_header Cache-Control "public, immutable, no-transform";
        access_log off;
    }

    # ─── Favicon ────────────────────────────────────────────────────
    location = /favicon.ico {
        proxy_pass http://app:3000;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    # ─── Robots.txt ─────────────────────────────────────────────────
    location = /robots.txt {
        proxy_pass http://app:3000;
        access_log off;
        log_not_found off;
    }

    # ─── Healthcheck ────────────────────────────────────────────────
    location = /api/health {
        proxy_pass http://app:3000;
        access_log off;
        proxy_cache off;
    }

    # ─── Bloqueia arquivos ocultos ──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
